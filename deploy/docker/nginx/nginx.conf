server {
    listen       80;
    server_name  localhost;
    charset      utf-8;
    charset_types text/css application/javascript text/plain text/xml application/json;

    # Docker volume mount path for generated deploy output:
    # app_tmp volume -> /var/www/generated, backend writes /app/tmp/code_deploy
    root /var/www/generated/code_deploy;

    # Route /{deployKey}/... to the app's files, fallback to /{deployKey}/index.html
    location ~ ^/([^/]+)/(.*)$ {
        try_files /$1/$2 /$1/index.html =404;
    }
}
