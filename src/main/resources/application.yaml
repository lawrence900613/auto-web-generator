spring:
  application:
    name: auto-web-generator
  profiles:
    active: local
  autoconfigure:
    exclude:
      - com.mybatisflex.spring.boot.FlexTransactionAutoConfiguration
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auto_web_generator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.example.autowebgenerator.controller

knife4j:
  enable: true
  setting:
    language: en

openai:
  api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
  model: gpt-5-mini
  max-tokens: 8192
  log-requests: true
  log-responses: true
