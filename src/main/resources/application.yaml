spring:
  application:
    name: auto-web-generator
  profiles:
    active: local
  autoconfigure:
    exclude:
      - com.mybatisflex.spring.boot.FlexTransactionAutoConfiguration
      - dev.langchain4j.community.store.embedding.redis.spring.RedisEmbeddingStoreAutoConfiguration
  session:
    store-type: redis
    timeout: 2592000  # 30 days in seconds
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}
      password: ${REDIS_PASSWORD:}
      ttl: 3600
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auto_web_generator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

server:
  port: 8123
  servlet:
    context-path: /api

mybatis-flex:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.example.autowebgenerator.controller

knife4j:
  enable: true
  setting:
    language: en

openai:
  api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
  model: gpt-4.1
  reasoning-model: gpt-5-mini
  max-tokens: 32768
  log-requests: true
  log-responses: true
