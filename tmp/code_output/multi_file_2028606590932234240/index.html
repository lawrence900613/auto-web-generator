<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h1>Project Board</h1>
    </div>
    <div class="main">
        <form id="taskForm">
            <input type="text" id="taskTitle" placeholder="Task Title" required>
            <select id="taskPriority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <select id="taskColumn">
                <option value="todo">To Do</option>
                <option value="inProgress">In Progress</option>
                <option value="done">Done</option>
            </select>
            <button type="submit">Add Task</button>
        </form>
        <div class="board">
            <div class="column" id="todoColumn">
                <h2>To Do</h2>
                <div class="taskList" id="todoList" ondragover="allowDrop(event)" ondrop="drop(event, 'todo')"></div>
            </div>
            <div class="column" id="inProgressColumn">
                <h2>In Progress</h2>
                <div class="taskList" id="inProgressList" ondragover="allowDrop(event)" ondrop="drop(event, 'inProgress')"></div>
            </div>
            <div class="column" id="doneColumn">
                <h2>Done</h2>
                <div class="taskList" id="doneList" ondragover="allowDrop(event)" ondrop="drop(event, 'done')"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
