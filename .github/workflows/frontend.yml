name: Frontend CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'auto-web-generator-frontend/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'auto-web-generator-frontend/**'

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-web-generator-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: auto-web-generator-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build-only

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: auto-web-generator-frontend/dist/
          retention-days: 7
