name: Frontend CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'auto-web-generator-frontend/**'
      - 'deploy/docker/frontend/Dockerfile'
      - 'deploy/docker/frontend/nginx.conf'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'auto-web-generator-frontend/**'
      - 'deploy/docker/frontend/Dockerfile'
      - 'deploy/docker/frontend/nginx.conf'
      - '.github/workflows/frontend.yml'

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-web-generator-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: auto-web-generator-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build-only

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: auto-web-generator-frontend/dist/
          retention-days: 7

  docker-publish:
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/frontend/Dockerfile
          build-args: |
            VITE_API_BASE=${{ vars.VITE_API_BASE }}
            VITE_DEPLOY_DOMAIN=${{ vars.VITE_DEPLOY_DOMAIN }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/auto-web-generator-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/auto-web-generator-frontend:${{ github.sha }}
